[hadoop]
hadoop_bin = /usr/local/hadoop-current/bin/hadoop

[hive]
hdfs_root = /user/prod_soda_trade_strategy/soda_international_trade_stg/hive/soda_international_trade_stg
table = user_action_sample_d_whole_v3
country_code = MX

[data]
# 训练数据窗口，按 dt 逐天遍历，左闭右闭，格式 YYYYMMDD
train_start = 20260627
train_end = 20260627
# max_num: 读取的样本(行)数上限，用于小规模测试；填 -1 表示读取整个窗口的全量数据
max_num = -1
# 打印原始数据时展示的样本行数
log_sample_count = 3
# 要使用的行为序列字段（逗号分隔，都遵循同一套 @_@ / ||| / 10字段 解析规范）
seq_fields = u_pay_item_seq_100,u_clk_item_seq_100
# 清洗模式（找不到 geo_sid 的 item 怎么处理）：
#   drop_missing = 逐 item 剔除找不到 geo_sid 的交互，保留序列其余部分（默认）
#   full_match   = 整条丢弃：非空字段零缺失才保留整条样本
clean_mode = drop_missing
# 本地时区相对 UTC 的偏移小时（MX = -6）：把 phone_time_local(UTC 毫秒戳)转本地时间，
# 用于生成 phone_time_local_str 和 meal_period
tz_offset_hours = -6
# step3 session 切分粒度：day = 按本地自然日切 session（目前仅支持 day）
session_granularity = day

# step3 train 的 behavior-drop 增强变体数 x：生成 x 个 drop 变体，丢弃比例 ri=i/(x+1) (i=1..x)，
# 加原始序列共 x+1 个版本；只作用于 train，val 不变；pay(高层级)不丢、clk 按比例丢。
# x=0 表示不做 behavior-drop 增强。
behavior_drop_x = 2
# train 区域（三分法下 = S1..S(m-2)）的最少交互数：少于该值的用户不出 train 序列
# （val/test 照常保留）。长度 1 的序列学不到任何转移模式，只会让模型记边际流行度。
min_train_seq_len = 2
# step3 样本落盘目录（相对路径以 common.conf 所在目录为基准）：
# 写 train/val/test.jsonl，供 train/dataset 读取；留空 = 只打印诊断不落盘
samples_out_dir = outputs/samples

# 测试数据窗口（供 eval/run_eval.sh 使用，决定读哪几天的快照）：
# 三分法下每用户最后一个 session（test label）天然是 train/val 都没见过的，
# 不依赖日历日期，test 窗口可以与训练窗口同天
test_start = 20260627
test_end = 20260627
# test 用户抽样比例：crc32(uid) 确定性抽样
test_sample_rate = 0.05
# test 用户数上限：>0 = 攒够即提前停（小规模快速评测用；集合依赖扫描前缀，
# 换窗口/上游 part 变化时会漂移）；-1 = 扫完整窗不早停（正式评测用，严格可复现）
test_max_num = 50000

[train]
# 训练启动方式（统一入口 train/run_train.sh 读取）：
#   local    = 在当前机器 GPU 直接跑（train_sft.sh）
#   platform = 提交到 Luban 训练平台并轮询到结束（submit_train.py，配置见 [platform]）
launch_mode = platform
# 模型结构二选一：
#   gamer = 论文对齐的手写 8 层 GAMERModel（CrossLevelBehaviorInteraction +
#           PositionBehaviorMoE），从零训练
#   qwen3 = 原生 Qwen3 结构（transformers 库）做 backbone，从 qwen3_path 的预训练权重
#           初始化，只替换词表；period/behavior 只是普通 token，无定制模块
model_type = qwen3
# model_type=qwen3 时必填：本地预训练权重目录（HF 格式 config.json + safetensors）。
# 支持相对路径（相对 common.conf 所在目录，即每次训练的固定启动根目录
# .../MiniOneRec/data/MX_item/inference/GEN_REC/{实验}/）；到
# .../chenpinyuan/MODEL/Qwen3-0.6B 固定隔 6 层，换实验目录名不用改这一行
qwen3_path = ../../../../../../MODEL/Qwen3-0.6B
# 数据接入模式：
#   jsonl  = 读 step3 落盘的 train/val.jsonl（小规模调试；需先跑 step3 且配 samples_out_dir）
#   stream = 训练时在 DataLoader worker 内直连 HDFS 流式生成，不落盘
#            每个 epoch 重新流一遍窗口数据，worker 按 part 文件分片互不重复读）
data_mode = stream
# stream 模式：局部洗牌缓冲区（条/每 worker 各持一份！编码后一条约 30~60KB，
# 主机内存 ≈ num_workers * shuffle_buffer * 50KB，开太大会被 OOM killer 杀 worker；
# 洗牌等效全局窗口 = num_workers * shuffle_buffer）
shuffle_buffer = 20000
# stream 模式：val 启动时流一遍数据按 uid 抽样收集、常驻内存（不适合每 epoch 重流）
# （小数据测试用 0.5 保证能收到足够 val；全量正式跑建议回 0.05）
val_sample_rate = 0.05
max_val_users = 20000
# （lr 调度总步数无需配置：stream 模式 epoch 1 结束后按实测步数自动校准，
#   jsonl 模式按数据量精确计算）
# step3 落盘样本目录与 tokenizer 词表（相对路径以 common.conf 所在目录为基准）
samples_dir = outputs/samples
vocab_path = outputs/vocab.json
# checkpoint 输出根目录：每次运行在其下建「启动时间」子目录（重跑不覆盖），
# 内含 best.pt（val loss 最低）/ last.pt（最后一个 epoch）；
# latest 软链指向最近一次运行
output_dir = outputs/ckpt
# 论文 4.1.4：lr 5e-4，AdamW，4% warmup 后余弦衰减到 1e-6，训 200 epoch 取 val loss 最低
epochs = 3
# 每步的序列条数（论文 batch 4096；单卡放不下就调小 batch_size、调大 grad_accum，
# 有效 batch = batch_size * grad_accum）
batch_size = 48
grad_accum = 1
# qwen3 backbone 是预训练权重初始化的，不是从零训练，5e-4（论文给 GAMER 从零训练用的）
# 对预训练模型偏大，容易把参数踹出预训练收敛点导致 loss 尖峰；降到微调常见量级
lr = 5e-5
min_lr = 1e-6
warmup_ratio = 0.04
weight_decay = 0.01
# 序列 token 上限（含 BOS；每交互 7 token = 时段+行为+5层SID，100 交互 * 7 + 1 = 701）
max_len = 708
# val loss 连续多少个 epoch 无改善就早停；0 = 不早停（论文训满取最优）
patience = 0
seed = 42
num_workers = 4
log_every = 50
# 每多少个 optimizer step 加跑一次完整 val（全量数据单 epoch 很长，epoch 末一次太稀；
# 创新低同样会存 best.pt）；0 = 只在每个 epoch 末跑
eval_every = 1000
# 断点续训：填某次 run 的目录（如 outputs/ckpt/20260711_122332）或其 last.pt 路径，
# 从其 epoch+1 继续训练、checkpoint 写回原目录；留空 = 全新训练。
# 注意：续训完成后记得清空，否则下次启动又从同一断点续。
resume_from = 
# wandb 监控（wandb_project 留空 = 关闭）
wandb_project = gamer-mx
# wandb.init() 失败重试次数（间隔 5s）；平台节点出网不稳定时用得上，
# 重试次数用完还失败就跳过监控、不阻塞训练
wandb_init_retries = 3
# API key（私有仓库，直接入配置；本地/平台容器通用）。留空则回退环境变量/~/.netrc
wandb_api_key = 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
# run 名留空则自动生成（gamer-{data_mode}-{时间戳}）
wandb_run_name = ntp_w_period_geo_qwen3

[eval]
# 评测启动方式（统一入口 eval/run_eval.sh 读取，跟 [train] launch_mode 同一套机制）：
#   local    = 在当前机器直接跑 run_eval.py
#   platform = 提交到 Luban 训练平台并轮询到结束（submit_eval.py，复用 [platform] 配置）
launch_mode = platform
# 评测 checkpoint（相对路径以 common.conf 所在目录为基准）；
# latest 指向最近一次训练，评测历史 run 就换成具体时间戳目录
ckpt_path = outputs/ckpt/latest/best.pt
# 指标的 K 列表：每个 K 输出 HR@K / Recall@K / NDCG@K，按 clk/pay 分开报
topk = 5,10,20
# 约束 beam search 宽度（>= 最大 K；越大越慢，默认取最大 K）
beam_size = 20
# 推理 batch（同时在 GPU 上的序列数 = batch_size * beam_size，OOM 就调小）
batch_size = 16
# 预测明细落盘目录（pred_clk.jsonl / pred_pay.jsonl，供 case 分析）
predictions_out_dir = outputs/predictions

[inference]
# 推理启动方式（统一入口 inference/generate.sh 读取，跟 [train]/[eval] launch_mode
# 同一套机制）：
#   local    = 在当前机器直接跑 generate.py
#   platform = 提交到 Luban 训练平台并轮询到结束（submit_infer.py，复用 [platform] 配置）
launch_mode = platform
# 批量推理（inference/generate.sh）：窗口内用户【全部历史】作前缀预测未来，
# 无 label 不算指标——收藏坐标邻域约束缓存（线上缓存预热用）。
# 不改前缀（仍只强制接 <时段><行为>），只把 beam search 首层(geohash)候选限定
# 在每个收藏坐标 radius_km 邻域内、词表真实存在的 geohash 集合中，模型仍自己
# 在集合内选具体 geohash；每用户按收藏坐标(去重)x periods 各出一份，
# 粒度 = uid x 圆心geohash x period（词表须含时段位）。
infer_start = 20260627
infer_end = 20260627
# 顺序取窗口内前 N 个可推用户（>=1 个交互即可推）；-1 = 全量
infer_max_num = 1000
# 每个用户按哪些行为各生成一份 top-K（逗号分隔，须在词表行为内）
behaviors = pay
# 时段条件（逗号分隔，须在词表时段内）；留空 = 词表全部时段
periods = bf,lc,dn
# 每组输出的推荐条数；beam_size < topk 时自动抬到 topk
topk = 20
beam_size = 20
batch_size = 4
ckpt_path = outputs/ckpt/latest/best.pt

# user_action 表里收藏坐标字段名（格式 lng@lat^lng@lat^...）
favor_coord_field = user_favor_coor_top3
# 每用户最多取前几个收藏坐标（geohash 去重后可能更少）
favor_coord_topk = 3
# 收藏坐标邻域半径（km）；半径内一个真实 item 的 geohash 都没有则跳过该缓存
favor_coord_radius_km = 4.0
# 缓存键 uid_<圆心geohash>_<此tag>_<period> 里的版本标签
cache_version_tag = Version3

# 调试：每个 cache_key 额外写一份到 debug_{行为}.jsonl（与 rec_*.parquet 同目录
# 并存，cache_key 粒度，字段含 uid/target_behavior/period/coord_rank/
# geohash(圆心)/lng/lat/legal_geohashes(合法白名单)/cache_key/item_result
# (该cache_key下全部真实item: item_id/shop_id/geo_sid)/history/prompt_tokens）；
# false 关闭以节省一次 decode + 一份 I/O（大规模正式跑可关）
write_debug_input = true
# 只限制 debug_{行为}.jsonl 落盘前 N 个 cache_key（用于抽样核对模型输入/
# item_result 长啥样；不影响 rec_*.parquet，那个永远是本次推理的全部结果，
# 也不影响 beam search 本身的计算/排序，仍会照常算完全部）；-1 = 不限
max_output_caches = 10

# 结果落盘根目录（本地/NFS）：其下按窗口建 {infer_start}_{infer_end}/ 子目录，
# 存 debug_{行为}.jsonl 与 _meta.json（本次配置+QPS 统计）；同窗口重跑覆盖。
# rec_{行为}.parquet 改落 hdfs_output_root（开发中，见下）
output_dir = outputs/inference

# [开发中] rec_{行为}.parquet 落 HDFS 的根目录：其下按 dt=YYYYMMDD 建分区，
# 每个 dt 每个 behavior 一个 rec_{行为}.parquet，是该 dt 的完整缓存快照
# （cache_key=uid_<geohash>_<cache_version_tag>_<period> 粒度 x rank，
# 含 cache_key/rank/score/sid/item_ids/shop_id/last_interact_ts 七列）。
# 每次推理找 <= infer_end 的最近历史 dt 读入当 baseline，按 cache_key
# 判重+按 last_interact_ts 判过期，只对新增/过期的重新推理，整分区
# 全量重写到 dt=infer_end
hdfs_output_root = /user/prod_soda_trade_strategy/rank/chenpinyuan/GenRec_Result_Version3

