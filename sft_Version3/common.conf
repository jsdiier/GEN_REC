[hadoop]
hadoop_bin = /usr/local/hadoop-current/bin/hadoop

[hive]
hdfs_root = /user/prod_soda_trade_strategy/soda_international_trade_stg/hive/soda_international_trade_stg
table = user_action_sample_d_whole_v2
country_code = MX

[data]
# 训练数据窗口，按 dt 逐天遍历，左闭右闭，格式 YYYYMMDD
train_start = 20260627
train_end = 20260627
# max_num: 读取的样本(行)数上限，用于小规模测试；填 -1 表示读取整个窗口的全量数据
max_num = -1
# 打印原始数据时展示的样本行数
log_sample_count = 3
# 要使用的行为序列字段（逗号分隔，都遵循同一套 @_@ / ||| / 10字段 解析规范）
seq_fields = u_pay_item_seq_100,u_clk_item_seq_100
# 清洗模式（找不到 geo_sid 的 item 怎么处理）：
#   drop_missing = 逐 item 剔除找不到 geo_sid 的交互，保留序列其余部分（默认）
#   full_match   = 整条丢弃：非空字段零缺失才保留整条样本
clean_mode = drop_missing
# 本地时区相对 UTC 的偏移小时（MX = -6）：把 phone_time_local(UTC 毫秒戳)转本地时间，
# 用于生成 phone_time_local_str 和 meal_period
tz_offset_hours = -6
# step3 session 切分粒度：day = 按本地自然日切 session（目前仅支持 day）
session_granularity = day

# step3 train 的 behavior-drop 增强变体数 x：生成 x 个 drop 变体，丢弃比例 ri=i/(x+1) (i=1..x)，
# 加原始序列共 x+1 个版本；只作用于 train，val 不变；pay(高层级)不丢、clk 按比例丢。
# x=0 表示不做 behavior-drop 增强。
behavior_drop_x = 2
# train 区域（S1..S(m-1)）的最少交互数：少于该值的用户不出 train 序列（val 照常保留）。
# 长度 1 的序列学不到任何转移模式，只会让模型记边际流行度。
min_train_seq_len = 2
# step3 样本落盘目录（相对路径以 common.conf 所在目录为基准）：
# 写 train.jsonl / val.jsonl，供 train/dataset 读取；留空 = 只打印诊断不落盘
samples_out_dir = outputs/samples

# 测试数据窗口（预留给后续独立的 test 流程：下载窗口数据 -> 整理 input/label ->
# 加载已训练 GAMER 推理 -> 比对算指标；step3 不读取这两项）
# test_start = 20260628
# test_end = 20260628

[train]
# 数据接入模式：
#   jsonl  = 读 step3 落盘的 train/val.jsonl（小规模调试；需先跑 step3 且配 samples_out_dir）
#   stream = 训练时在 DataLoader worker 内直连 HDFS 流式生成，不落盘（TB 级数据用；
#            每个 epoch 重新流一遍窗口数据，worker 按 part 文件分片互不重复读）
data_mode = stream
# stream 模式：局部洗牌缓冲区（条）；越大越接近全局 shuffle，内存占用越高
shuffle_buffer = 10000
# stream 模式：val 启动时流一遍数据按 uid 抽样收集、常驻内存（不适合每 epoch 重流）
# （小数据测试用 0.5 保证能收到足够 val；全量正式跑建议回 0.05）
val_sample_rate = 0.5
max_val_users = 20000
# （lr 调度总步数无需配置：stream 模式 epoch 1 结束后按实测步数自动校准，
#   jsonl 模式按数据量精确计算）
# step3 落盘样本目录与 tokenizer 词表（相对路径以 common.conf 所在目录为基准）
samples_dir = outputs/samples
vocab_path = outputs/vocab.json
# checkpoint 输出目录（best.pt = val loss 最低；last.pt = 最后一个 epoch）
output_dir = outputs/ckpt
# 论文 4.1.4：lr 5e-4，AdamW，4% warmup 后余弦衰减到 1e-6，训 200 epoch 取 val loss 最低
epochs = 10
# 每步的序列条数（论文 batch 4096；单卡放不下就调小 batch_size、调大 grad_accum，
# 有效 batch = batch_size * grad_accum）
batch_size = 64
grad_accum = 4
lr = 5e-4
min_lr = 1e-6
warmup_ratio = 0.04
weight_decay = 0.01
# 序列 token 上限（含 BOS；约 100 个交互 * 5 + 1）
max_len = 512
# val loss 连续多少个 epoch 无改善就早停；0 = 不早停（论文训满取最优）
patience = 0
seed = 42
num_workers = 2
log_every = 50
# wandb 监控（wandb_project 留空 = 关闭）。API key 不进配置文件：
# 远端先执行 `wandb login <token>` 或 export WANDB_API_KEY=<token>
wandb_project = gamer-mx
# run 名留空则自动生成（gamer-{data_mode}-{时间戳}）
wandb_run_name =

[item_map]
# item_id -> geo_sid 映射表（本地 parquet，含 item_id / geo_sid 等列）
item_map_path = /home/luban/rank-ssl/chenpinyuan/MiniOneRec/prepare_rqvae_data/prepare_rqvae_data/rqvae_item_w_geo_V1/item_info/MX_item_recall.parquet
