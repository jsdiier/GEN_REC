[hadoop]
hadoop_bin = /usr/local/hadoop-current/bin/hadoop

[hive]
hdfs_root = /user/prod_soda_trade_strategy/soda_international_trade_stg/hive/soda_international_trade_stg
table = user_action_sample_d_whole_v2
country_code = MX

[data]
# 训练数据窗口，按 dt 逐天遍历，左闭右闭，格式 YYYYMMDD
train_start = 20260627
train_end = 20260627
# max_num: 读取的样本(行)数上限，用于小规模测试；填 -1 表示读取整个窗口的全量数据
max_num = 5000
# 打印原始数据时展示的样本行数
log_sample_count = 3
# 开关：只保留缺失率为 0 的样本（序列里每个 item 都能映射到 geo_sid，
# 且序列非空）。true 时空序列与含缺失的序列都丢弃。
keep_only_full_match = true

[item_map]
# item_id -> geo_sid 映射表（本地 parquet，含 item_id / geo_sid 等列）
item_map_path = /home/luban/rank-ssl/chenpinyuan/MiniOneRec/prepare_rqvae_data/prepare_rqvae_data/rqvae_item_w_geo_V1/item_info/MX_item_recall.parquet
